<html>
    <head>
        <title>Sistema de Pontuação</title>
        <link rel="stylesheet" type="text/css" href="css/style.css">
        <script src="./javascript/javascript.js"></script>

    </head>
    <body>
        <div class="container">
            <h1>Sistema de Pontuação</h1>
            <p>Pontuação: <span id="score">0</span></p>
            <div class="buttons">
                <button onclick="subtractPoints(5)">-5 XP</button>
                <button onclick="addPoints(10)">+10 XP</button>
            </div>
        </div>
